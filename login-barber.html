<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Barber – Barber Login</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:#F0F0EA;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;padding:30px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,.1)}
.logo-box{background:#F5E030;padding:10px 20px;border-radius:8px;text-align:center;margin-bottom:20px}
.logo-text{font-family:'Bebas Neue';font-size:30px;color:#003D2B}
.role-banner{background:#004F38;color:#F5E030;padding:12px;border-radius:8px;margin-bottom:20px}
h2{margin-bottom:5px}
.sub{font-size:13px;color:#666;margin-bottom:20px}
label{font-size:12px;font-weight:700;margin-bottom:5px;display:block}
input{width:100%;padding:12px;border:2px solid #ddd;border-radius:8px;margin-bottom:15px}
.btn{width:100%;padding:14px;border:none;border-radius:8px;font-weight:800;cursor:pointer}
.btn-primary{background:#004F38;color:#F5E030}
.btn-secondary{margin-top:10px;border:2px solid #ddd;text-align:center;display:block;padding:12px;text-decoration:none;color:#666}
.err{color:red;text-align:center;margin-bottom:10px;display:none}
</style>
</head>

<body>

<div class="card">

<div class="logo-box"><span class="logo-text">BB</span></div>

<div class="role-banner">✂️ Barber Login</div>

<h2>Barber Portal</h2>
<p class="sub">Enter phone & PIN</p>

<div id="errMsg" class="err"></div>

<label>Mobile</label>
<input type="tel" id="phoneInput" maxlength="10" oninput="this.value=this.value.replace(/\D/g,'')">

<label>PIN</label>
<input type="password" id="pinInput" maxlength="4" oninput="this.value=this.value.replace(/\D/g,'')">

<button class="btn btn-primary" onclick="loginBarber()">Login →</button>
<a href="index.html" class="btn btn-secondary">← Back</a>

</div>

<script>
const SHEET_URL = 'PASTE_YOUR_NEW_WEB_APP_URL_HERE';
const DEBUG = true;

function logDebug(...args){
    if(!DEBUG) return;
    console.log(...args);

    let dbg = document.getElementById('debugBox');
    if(!dbg){
        dbg = document.createElement('div');
        dbg.style="margin-top:20px;background:#111;color:#0f0;padding:10px;font-size:11px;max-height:200px;overflow:auto";
        document.body.appendChild(dbg);
    }
    dbg.innerHTML += args.join(' ') + "<br>";
}

function loginBarber(){

    const phone = document.getElementById('phoneInput').value.trim();
    const pin = document.getElementById('pinInput').value.trim();

    if(!/^\d{10}$/.test(phone)) return showError("Invalid phone");
    if(!/^\d{4}$/.test(pin)) return showError("Invalid PIN");

    const url = SHEET_URL + "?phone=" + phone;

    logDebug("Calling:", url);

    fetch(url)
    .then(res => res.json())
    .then(data => {

        logDebug("Response:", JSON.stringify(data));

        if(data.error){
            throw new Error(data.message);
        }

        if(!data.success){
            return showError("Barber not found");
        }

        const user = data.user;

        if(String(user.loginPin).trim() !== pin){
            return showError("Wrong PIN");
        }

        logDebug("LOGIN SUCCESS");

        sessionStorage.clear();
        sessionStorage.setItem('bb_role','barber');
        sessionStorage.setItem('bb_name', user.name);

        window.location.href = 'app-barber.html';
    })
    .catch(err => {
        logDebug("ERROR:", err.message);
        showError("Connection error");
    });
}

function showError(msg){
    const el = document.getElementById('errMsg');
    el.innerText = msg;
    el.style.display = 'block';
}
</script>

</body>
</html>
