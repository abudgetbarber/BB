<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Barber – Barber Login</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:#F0F0EA;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px}
.card{background:white;border-radius:16px;padding:32px 24px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,.10);border:1px solid #E0E0D8}
.logo-wrap{text-align:center;margin-bottom:24px}
.logo-box{display:inline-block;background:#F5E030;border-radius:10px;padding:10px 24px}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:32px;color:#003D2B}
.role-banner{background:#004F38;color:#F5E030;border-radius:10px;padding:14px 16px;display:flex;gap:12px;margin-bottom:24px}
h2{font-size:22px;font-weight:800;color:#1A1A14;margin-bottom:4px}
.sub{font-size:13px;color:#767668;margin-bottom:22px}
label{display:block;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#767668;margin-bottom:8px}
input{width:100%;background:#F8F8F4;border:2px solid #E0E0D8;border-radius:8px;padding:14px 15px;font-size:16px}
input:focus{border-color:#004F38;outline:none}
.fg{margin-bottom:18px}
.btn{width:100%;padding:15px;border-radius:8px;border:none;cursor:pointer;font-weight:800;text-transform:uppercase}
.btn-primary{background:#004F38;color:#F5E030}
.err{color:#DC2626;font-size:13px;font-weight:600;text-align:center;margin-bottom:12px;display:none}
</style>
</head>

<body>

<div class="card">

  <div class="logo-wrap">
    <div class="logo-box"><span class="logo-text">BB</span></div>
  </div>

  <div class="role-banner">✂️ Barber Login</div>

  <h2>Barber Portal</h2>
  <p class="sub">Enter your phone number and 4-digit PIN</p>

  <div id="errMsg" class="err"></div>

  <div class="fg">
    <label for="phoneInput">MOBILE NUMBER</label>
    <input id="phoneInput" type="tel" maxlength="10" inputmode="numeric"
      placeholder="Enter mobile number"
      oninput="this.value=this.value.replace(/\D/g,'')">
  </div>

  <div class="fg">
    <label for="pinInput">PIN</label>
    <input id="pinInput" type="password" maxlength="4" inputmode="numeric"
      placeholder="Enter PIN"
      oninput="this.value=this.value.replace(/\D/g,'')">
  </div>

  <!-- ✅ FIXED BUTTON -->
  <button id="loginBtn" class="btn btn-primary">Login</button>

</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbygAEyBOyRP57tXYaHS5lVBH1gRMbmfM7Fw64iSBuh-J1_8WKe_3vFu5LhdsT7sKd1-GQ/exec';

function cleanPhone(p){
  return String(p || '').replace(/\D/g, '').slice(-10);
}

async function doLogin(){

  const phone = document.getElementById('phoneInput').value.trim();
  const pin   = document.getElementById('pinInput').value.trim();

  if (!phone || cleanPhone(phone).length < 10) {
    return showError('Enter valid phone');
  }

  if (!pin || pin.length < 4) {
    return showError('Enter 4-digit PIN');
  }

  showError('Checking...', true);

  try {
    const res = await fetch(SHEET_URL + '?t=' + Date.now());
    const text = await res.text();

    console.log("RAW:", text);

    let json = JSON.parse(text);

    // ✅ CORRECT DATA EXTRACTION
    if (!json?.data?.staff || !Array.isArray(json.data.staff)) {
      return showError('Invalid data format');
    }

    const staffList = json.data.staff;

    console.log("STAFF:", staffList);

    // ✅ FIND USER (NO ROLE FILTER)
    const user = staffList.find(u =>
      cleanPhone(u.phone) === cleanPhone(phone)
    );

    if (!user) return showError('User not registered');

    if (!user.loginPin) return showError('PIN not set');

    if (String(pin) !== String(user.loginPin)) {
      return showError('Wrong PIN');
    }

    // ✅ SAVE
    localStorage.setItem('bb_role', user.role || '');
    localStorage.setItem('bb_phone', cleanPhone(phone));
    localStorage.setItem('bb_name', user.name || '');

    showError('', false);

    // ✅ ROLE REDIRECT
    if (user.role === 'barber') {
      window.location.href = 'app-barber.html';
    } else if (user.role === 'manager') {
      window.location.href = 'app-manager.html';
    } else {
      window.location.href = 'app-staff.html';
    }

  } catch (err) {
    console.error(err);
    showError('Network error');
  }
}

function showError(msg, show = true){
  const el = document.getElementById('errMsg');
  el.style.display = show ? 'block' : 'none';
  el.textContent = msg;
}

// ✅ EVENTS
document.getElementById("loginBtn").addEventListener("click", doLogin);

document.addEventListener("keydown", function(e){
  if (e.key === "Enter") doLogin();
});
</script>

</body>
</html>
